    warn: "bg-rose-700/45 text-rose-200 dark:bg-rose-950/70 dark:text-rose-400"
    danger: "bg-rose-700/45 text-rose-200 dark:bg-rose-950/70 dark:text-rose-400"

layout:
  Dealer Portal:
    tab: CHeKT

    Kibana:
      style: row
      columns: 3
    Grafana:
      style: row
      columns: 3
    GitOps:
      style: row
      columns: 3

  Misc:
    tab: CHeKT
    style: row
    columns: 3

  ADC:
    tab: ADC
    header: false
    style: row
